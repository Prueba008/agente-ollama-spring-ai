spring:
  application:
    name: agente-ollama-spring-ai-test
  ai:
    model:
      chat: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:qwen3:8b}
          temperature: 0.2

agent:
  guardrails:
    max-input-chars: 12000
  rag:
    top-k: 4
  evaluation:
    min-relevance: 0.70
    min-faithfulness: 0.75

logging:
  level:
    com.maasteria.agent: DEBUG
    org.springframework.ai: DEBUG
